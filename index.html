<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Incurred Claims Analytics</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --primary: #0984e3; --secondary: #00cec9; --dark: #2d3436; --light: #f4f7f6; --danger: #e17055; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 15px; font-size: 13px; }
        .container { max-width: 1200px; margin: auto; }
        
        #uploadScreen { background: white; padding: 60px 40px; border-radius: 15px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-top: 50px; display: block; }
        .hospital-icon { width: 80px; height: 80px; fill: var(--primary); margin-bottom: 20px; }
        .drop-zone { border: 2px dashed var(--secondary); padding: 40px; border-radius: 12px; cursor: pointer; background: #f0fdfc; transition: 0.3s; }
        
        #mainDashboard { display: none; }
        .no-print { background: var(--dark); color: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        
        #pdf-report { background: white; padding: 20px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .hospital-profile { background: var(--primary); color: white; padding: 15px; border-radius: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .profile-card span { display: block; font-size: 10px; text-transform: uppercase; opacity: 0.8; }
        
        .report-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px; }
        .card { border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--primary); border-bottom: 1px solid #eee; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f8f9fa; padding: 6px; text-align: left; border-bottom: 2px solid var(--primary); }
        td { padding: 6px; border-bottom: 1px solid #eee; }
        
        .chart-container { position: relative; height: 200px; width: 100%; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="uploadScreen">
        <svg class="hospital-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/></svg>
        <h1>Medical Claims Audit Portal</h1>
        <p>Upload your Excel file to begin.</p>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <strong>Click to select Excel File (.xlsx)</strong>
        </div>
        <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none">
    </div>

    <div id="mainDashboard">
        <div class="no-print">
            <input type="text" id="hospitalSearch" placeholder="Search Rohini ID..." style="padding:8px; width:220px; border-radius:4px; border:none;">
            <button class="btn" style="background:var(--secondary);" onclick="performAnalysis()">Analyze</button>
            <button class="btn" style="background:var(--danger); color:white;" onclick="exportToPDF()">Export PDF</button>
            <button class="btn" style="background:#636e72; color:white; margin-left: auto;" onclick="location.reload()">New Upload</button>
        </div>

        <div id="pdf-report">
            <div class="hospital-profile">
                <div class="profile-card"><span>Provider</span><strong id="pName">-</strong></div>
                <div class="profile-card"><span>Rohini</span><strong id="pRohini">-</strong></div>
                <div class="profile-card"><span>Top Diagnosis</span><strong id="pDiag">-</strong></div>
                <div class="profile-card"><span>Discount</span><strong id="pDisc">-</strong></div>
            </div>

            <div class="card">
                <h3>Financial Summary (Incurred)</h3>
                <table>
                    <thead id="bizHead"><tr><th>Metric</th></tr></thead>
                    <tbody id="bizBody">
                        <tr id="rowVal"><td>Total Incurred</td></tr>
                        <tr id="rowCount"><td>Claims Count</td></tr>
                        <tr id="rowAcs"><td>Avg Claim Size (ACS)</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="report-grid">
                <div class="card"><h3>ACS Trend</h3><div class="chart-container"><canvas id="trendChart"></canvas></div></div>
                <div class="card"><h3>Procedures</h3><table id="procTable"><thead id="procHead"><tr><th>Proc</th><th>Vol</th></tr></thead><tbody id="procBody"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<script>
    let rawData = null;
    let chartInstance = null;

    // RECTIFIED: Explicit UI switching logic
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                if (rawData && rawData.length > 0) {
                    // FORCE UI SWITCH
                    document.getElementById('uploadScreen').style.display = 'none';
                    document.getElementById('mainDashboard').style.display = 'block';
                    alert("Data Loaded Successfully! Enter Rohini ID to begin.");
                } else {
                    alert("The Excel file seems to be empty.");
                }
            } catch (err) {
                alert("Error reading Excel: " + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function fuzzyGet(row, targets) {
        const keys = Object.keys(row);
        for (let t of targets) {
            let found = keys.find(k => k.toLowerCase().replace(/[^a-z]/g, '').includes(t.toLowerCase().replace(/[^a-z]/g, '')));
            if (found) return row[found];
        }
        return null;
    }

    function performAnalysis() {
        const input = document.getElementById('hospitalSearch').value.trim().toLowerCase();
        if(!input) return alert("Please enter a Rohini ID.");

        const filtered = rawData.filter(r => {
            const rID = String(fuzzyGet(r, ['rohini', 'rohiniid']) || "").toLowerCase().trim();
            const hID = String(fuzzyGet(r, ['hospitalid', 'id']) || "").toLowerCase().trim();
            return rID === input || hID === input;
        });

        if (filtered.length === 0) return alert("No records found for this ID.");

        const meta = filtered[0];
        document.getElementById('pName').innerText = fuzzyGet(meta, ['hospitalname', 'name']) || 'N/A';
        document.getElementById('pRohini').innerText = fuzzyGet(meta, ['rohini', 'rohiniid']) || 'N/A';
        document.getElementById('pDisc').innerText = (fuzzyGet(meta, ['discount']) || 0) + "%";

        const diagCounts = {};
        filtered.forEach(r => {
            const d = fuzzyGet(r, ['diagnosis', 'disease', 'icd']) || 'Other';
            diagCounts[d] = (diagCounts[d] || 0) + 1;
        });
        document.getElementById('pDiag').innerText = Object.entries(diagCounts).sort((a,b)=>b[1]-a[1])[0][0];

        const years = [...new Set(filtered.map(r => fuzzyGet(r, ['year'])))].sort().slice(-3);
        const stats = years.map(y => {
            const yrSet = filtered.filter(r => fuzzyGet(r, ['year']) == y);
            const sumIncurred = yrSet.reduce((a, b) => a + (parseFloat(fuzzyGet(b, ['incurred', 'approved', 'paid', 'amount'])) || 0), 0);
            return { year: y, sum: sumIncurred, count: yrSet.length, acs: sumIncurred / yrSet.length };
        });

        renderAnalysis(years, stats, filtered);
    }

    function renderAnalysis(years, stats, filtered) {
        document.getElementById('bizHead').innerHTML = '<tr><th>Metric</th>' + years.map(y => `<th>FY ${y}</th>`).join('') + '</tr>';
        document.getElementById('rowVal').innerHTML = `<td>Total Incurred</td>` + stats.map(s => `<td>₹${s.sum.toLocaleString()}</td>`).join('');
        document.getElementById('rowCount').innerHTML = `<td>Claims Count</td>` + stats.map(s => `<td>${s.count}</td>`).join('');
        document.getElementById('rowAcs').innerHTML = `<td>Incurred ACS</td>` + stats.map(s => `<td>₹${s.acs.toFixed(0)}</td>`).join('');

        const ctx = document.getElementById('trendChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: years, 
                datasets: [{ label: 'ACS (₹)', data: stats.map(s => s.acs), borderColor: '#0984e3', tension: 0.3, fill: true, backgroundColor: 'rgba(9, 132, 227, 0.1)' }] 
            },
            options: { maintainAspectRatio: false }
        });

        const pMap = {};
        filtered.forEach(r => {
            const proc = fuzzyGet(r, ['procedure', 'treatment']);
            if(!pMap[proc]) pMap[proc] = { count: 0 };
            pMap[proc].count++;
        });

        const sortedProcs = Object.entries(pMap).sort((a,b)=>b[1].count - a[1].count).slice(0, 10);
        document.getElementById('procHead').innerHTML = `<tr><th>Procedure</th><th>Vol</th>` + years.map(y => `<th>${y} ACS</th>`).join('') + '</tr>';
        document.getElementById('procBody').innerHTML = sortedProcs.map(([name, data]) => {
            const yCells = years.map(y => {
                const matches = filtered.filter(f => fuzzyGet(f, ['procedure']) === name && fuzzyGet(f, ['year']) == y);
                const avg = matches.length ? (matches.reduce((a,b)=>a+parseFloat(fuzzyGet(b,['incurred', 'amount'])),0)/matches.length).toFixed(0) : '-';
                return `<td>${avg !== '-' ? '₹'+avg : '-'}</td>`;
            }).join('');
            return `<tr><td>${name}</td><td>${data.count}</td>${yCells}</tr>`;
        }).join('');
    }

    function exportToPDF() {
        const element = document.getElementById('pdf-report');
        html2pdf().set({ margin: 0.3, filename: 'Analysis.pdf', html2canvas: { scale: 2 }, jsPDF: { format: 'a4', orientation: 'landscape' } }).from(element).save();
    }
</script>
</body>
</html>
